      function localizeResource(resource, language) {
        return {
          ...resource,
          name: language === "ar" ? resource.nameAr : resource.name,
          description: language === "ar" ? resource.descriptionAr : resource.description,
        };
      }

      function loadImpact() {
        try {
          const saved = JSON.parse(localStorage.getItem(storageKey));
          if (saved) return saved;
        } catch (error) {
          return null;
        }

        return {
          downloads: 0,
          organizations: 0,
          templates: {},
          submissions: [],
        };
      }

      function loadAccess() {
        try {
          return JSON.parse(localStorage.getItem(accessStorageKey)) === true;
        } catch (error) {
          return false;
        }
      }

      function downloadResource(resource) {
        const link = document.createElement("a");
        link.href = resource.fileUrl;
        link.download = resource.downloadName || "";
        document.body.appendChild(link);
        link.click();
        link.remove();
      }

      function summarizeSubmissions(submissions, key) {
        return Object.entries(
          (submissions || []).reduce((summary, entry) => {
            const value = (entry[key] || "").trim();
            if (!value) return summary;
            summary[value] = (summary[value] || 0) + 1;
            return summary;
          }, {})
        ).sort((a, b) => b[1] - a[1]);
      }

      function splitName(fullName) {
        const parts = fullName.trim().split(/\s+/).filter(Boolean);
        return {
          firstName: parts[0] || "",
          lastName: parts.slice(1).join(" "),
        };
      }

      async function submitToPowerAutomate(submission) {
        if (!powerAutomateUrl) return;

        const { firstName, lastName } = splitName(submission.name || "");
        const payload = {
          timestamp: new Date().toISOString(),
          firstName,
          lastName,
          email: submission.email,
          organization: submission.organization,
          country: submission.country,
          region: submission.region || "",
          role: submission.role,
          sector: submission.sector,
          source: "Website",
          requestedResource: submission.requestedResource,
        };

        try {
          await fetch(powerAutomateUrl, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });
        } catch (error) {
          await fetch(powerAutomateUrl, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify(payload),
          }).catch(() => null);
        }
      }

          organization: "",
          role: "",

          sector: "",

        );

          setImpact((currentImpact) => {
            const currentSubmissions = currentImpact.submissions || [];
            const currentTemplates = currentImpact.templates || {};
            const nextSubmissions = submission
              ? [...currentSubmissions, submission]
              : currentSubmissions;
            const uniqueOrganizations = new Set(
              nextSubmissions.map((entry) => entry.organization.toLowerCase()).filter(Boolean)
            );

            return {
              downloads: (currentImpact.downloads || 0) + 1,
              organizations: uniqueOrganizations.size,
              templates: {
                ...currentTemplates,
                [template.name]: (currentTemplates[template.name] || 0) + 1,
              },
              submissions: nextSubmissions,
            };
          });
        }

        function openDownload(template) {
          setSelectedTemplate(template);
          setNotice("");

          if (hasAccess) {
            recordDownload(template);
            downloadResource(template);
            setNotice(`${template.name} ${copy.notice}`);
            return;
          }

          setIsModalOpen(true);
        }

        async function submitDownload(event) {
          event.preventDefault();

          const cleanForm = Object.fromEntries(
            Object.entries(form).map(([key, value]) => [key, value.trim()])
          );

          const submission = {
            ...cleanForm,
            requestedResource: selectedTemplate.name,
            unlockedAt: new Date().toISOString(),
          };

          setHasAccess(true);
          recordDownload(selectedTemplate, submission);
          downloadResource(selectedTemplate);
          setIsModalOpen(false);
          setNotice(`${selectedTemplate.name} ${copy.notice}`);
          setForm({ name: "", email: "", organization: "", role: "", country: "", sector: "" });
        }

                      type="button"
                      onClick={() => setIsModalOpen(false)}
                      className="flex h-10 w-10 items-center justify-center rounded-full border border-gray-200 text-xl font-bold text-gray-500 hover:border-karm-red hover:text-karm-red"
                      aria-label={copy.closeForm}
                    >
                      X
                    </button>
                  </div>
                  <form onSubmit={submitDownload} className="grid gap-4">
                    {copy.fields.map(([name, label, type]) => (
                      <label key={name} className="grid gap-2 text-sm font-bold text-karm-charcoal">
                        {label}
                        <input
                          required
                          type={type}
                          value={form[name]}
                          onChange={(event) => setForm({ ...form, [name]: event.target.value })}
                          className="rounded-lg border border-gray-200 px-4 py-3 text-base font-medium outline-none transition focus:border-karm-blue focus:ring-4 focus:ring-karm-blue/15"
                        />
                      </label>
                    ))}
                    <p className="rounded-lg bg-gray-50 p-4 text-sm leading-6 text-gray-600">
                      {copy.privacy}
                    </p>
                    <button
                      type="submit"
                      className="rounded-full bg-karm-red px-6 py-4 text-sm font-black text-white shadow-soft transition hover:-translate-y-0.5"
                    >
                      {copy.submitDownload}
                    </button>
                  </form>
                </div>
              </div>
            )}
          </main>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
